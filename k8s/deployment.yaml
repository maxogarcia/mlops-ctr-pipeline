apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctr-pipeline
  labels:
    app: ctr-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ctr-pipeline
  template:
    metadata:
      labels:
        app: ctr-pipeline
    spec:
      containers:
      - name: ctr-pipeline
        image: maxogarcia/ctr-pipeline:latest
        ports:
        - containerPort: 8000
        env:
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service:5000"
        - name: MODEL_NAME
          value: "ctr_xgboost"
        - name: MODEL_VERSION
          value: "1"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
